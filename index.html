<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Light Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fdfbf7 0%, #f5f7ff 50%, #f0f4ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* ── Card Container ── */
    .card {
      position: relative;
      width: 100%;
      max-width: 920px;
      min-height: 600px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 32px;
      box-shadow: 0 28px 60px -15px rgba(0, 0, 0, 0.06);
      padding: 64px 48px;
      margin: 20px;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }

    /* ── Soft Decorative Blobs ── */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.65;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 320px; height: 320px; background: #e0c3fc; top: -70px; right: -50px; }
    .blob-2 { width: 260px; height: 260px; background: #c3f0e0; bottom: -40px; left: -30px; }
    .blob-3 { width: 190px; height: 190px; background: #ffc3b3; top: 45%; left: 65%; }

    /* ── Content Wrapper ── */
    .content {
      position: relative;
      z-index: 2;
      max-width: 620px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.95);
      color: #6b7280;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
      margin-bottom: 26px;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: clamp(48px, 8vw, 92px);
      font-weight: 800;
      line-height: 1.05;
      color: #1f2937;
      letter-spacing: -2.5px;
      margin-bottom: 22px;
    }

    h1 .accent {
      background: linear-gradient(135deg, #c4b5fd, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.7;
      color: #4b5563;
      margin-bottom: 34px;
      max-width: 580px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, #c4b5fd, #a5b4fc);
      color: #1f2937;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 15px 30px;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(165, 180, 252, 0.32);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 35px rgba(165, 180, 252, 0.45);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }
    .btn:hover svg {
      transform: translateX(4px);
    }

    /* ── Footer Note ── */
    .footer-note {
      position: absolute;
      right: 48px;
      bottom: 48px;
      z-index: 2;
      font-size: 14px;
      color: #9ca3af;
      text-align: right;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .card {
        padding: 44px 28px;
        min-height: 520px;
      }
      .content {
        text-align: center;
      }
      .tag, .btn {
        margin: 0 auto;
      }
      .footer-note {
        position: static;
        margin-top: 32px;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <main class="card">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="content">
      <div class="tag">✨ Premium Light Design</div>
      <h1>Modern.<br>Clean.<br>Beautiful.</h1>
      <p>Designed with clarity, elegance, and confidence. A soft professional aesthetic with bold typography and a premium pastel palette.</p>
      <a href="#" class="btn">
        Get Started
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="footer-note">
      Soft palette • Large fonts • Professional style
    </div>
  </main>

</body>
</html>
